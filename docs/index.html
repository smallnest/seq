<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seq — lazy chainable collection pipelines · Go 1.27</title>
<script>
(function () {
  // Pick target page: remembered choice first, else browser language.
  var KEY = 'seq-docs-lang';
  var saved = null;
  try { saved = localStorage.getItem(KEY); } catch (e) {}
  var lang = saved;
  if (lang !== 'zh' && lang !== 'en') {
    var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    lang = nav.indexOf('zh') === 0 ? 'zh' : 'en';
  }
  location.replace(lang === 'zh' ? 'zh.html' : 'en.html');
})();
</script>
<meta http-equiv="refresh" content="0; url=en.html">
</head>
<body>
<p>Redirecting… If you are not redirected, choose a language:
<a href="zh.html">中文</a> · <a href="en.html">English</a>.</p>
</body>
</html>
